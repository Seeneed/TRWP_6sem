<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TDWA02-01</title>
    <link rel="stylesheet" href="TDWA02-01.css">
</head>
<body>
    <h1>Калькулятор через NGINX</h1>

    <div class="container">
        <div class="card">
            <h2>Просмотр и удаление</h2>
            <button id="getBtn">GET (Получить)</button>
            <button id="deleteBtn">DELETE (Удалить)</button>
        </div>

        <div class="card">
            <h2>Создание и обновление (POST/PUT)</h2>
            <div class="form-group">
                <label for="op">Операция (op):</label>
                <input type="text" id="op" placeholder="add, sub, mul, div">
            </div>
            <div class="form-group">
                <label for="x">Число X:</label>
                <input type="number" id="x" placeholder="10">
            </div>
            <div class="form-group">
                <label for="y">Число Y:</label>
                <input type="number" id="y" placeholder="5">
            </div>
            <button id="postBtn">POST (Создать)</button>
            <button id="putBtn">PUT (Обновить)</button>
        </div>
    </div>

    <div class="result-container">
        <h2>Результат:</h2>
        <pre id="result"></pre>
    </div>

    <script src="TDWA02-01.js"></script>
</body>
</html>
